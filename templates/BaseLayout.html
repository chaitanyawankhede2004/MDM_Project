<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}College Predictor{% endblock %}</title>
<script src="https://www.google.com/search?q=https://cdn.tailwindcss.com"></script>
<link href="https://www.google.com/search?q=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans">

<!-- Navigation -->
<nav class="bg-indigo-900 text-white shadow-lg">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
        <a href="/" class="text-2xl font-bold flex items-center gap-2">
            <i class="fas fa-graduation-cap"></i>
            <span>EduPredict</span>
        </a>
        <div class="space-x-6">
            {% if session.get('name') %}
                <span class="text-indigo-200">Welcome, {{ session['name'] }}</span>
                <a href="/dashboard" class="hover:text-indigo-200 transition">Dashboard</a>
                <a href="/logout" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-sm transition">Logout</a>
            {% else %}
                <a href="/login" class="hover:text-indigo-200 transition">Login</a>
                <a href="/register" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg transition">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="flex-grow container mx-auto px-6 py-10">
    {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="bg-slate-800 text-slate-400 py-6 text-center text-sm">
    <p>&copy; 2024 Engineering Admission Portal by Chaitanya Wankhede. All rights reserved.</p>
</footer>


</body>
</html>
