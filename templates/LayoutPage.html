{% extends "layout.html" %}

{% block title %}Login - EduPredict{% endblock %}

{% block content %}

<div class="max-w-md mx-auto bg-white p-10 rounded-2xl shadow-xl border border-slate-100">
<div class="text-center mb-8">
<h2 class="text-3xl font-bold text-slate-800">Welcome Back</h2>
<p class="text-slate-500 mt-2">Enter your credentials to access your dashboard</p>
</div>

<form method="post" class="space-y-6">
    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Enrollment Number</label>
        <input type="text" name="enr" required class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition" placeholder="e.g. 21000123">
    </div>
    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
        <input type="password" name="password" required class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition" placeholder="••••••••">
    </div>
    <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition shadow-md">
        Sign In
    </button>
</form>

<p class="text-center mt-8 text-slate-600 text-sm">
    Don't have an account? <a href="/register" class="text-indigo-600 font-bold hover:underline">Register here</a>
</p>


</div>
{% endblock %}
