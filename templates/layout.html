<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EduPredict{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container flex justify-between items-center">
            <a href="/" class="logo">
                <i class="fas fa-graduation-cap"></i>
                EduPredict
            </a>
            <div class="nav-links">
                {% if session.get('name') %}
                    <span>👋 Welcome, {{ session['name'] }}</span>
                    <a href="/dashboard">Dashboard</a>
                    <a href="/search">Search Database</a>
                    <a href="/logout" class="btn-danger"><i class="fas fa-sign-out-alt"></i> Logout</a>
                {% else %}
                    <a href="/login" class="btn-outline">Sign In</a>
                    <a href="/register" class="btn-filled"><i class="fas fa-user-plus"></i> Get Started</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Engineering Admission Portal. Designed for Excellence.</p>
    </footer>

</body>
</html>
