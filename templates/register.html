{% extends "layout.html" %}

{% block title %}Register - EduPredict{% endblock %}

{% block content %}

<div class="max-w-md mx-auto bg-white p-10 rounded-2xl shadow-xl border border-slate-100">
<div class="text-center mb-8">
<h2 class="text-3xl font-bold text-slate-800">Create Account</h2>
<p class="text-slate-500 mt-2">Start your journey to the right college</p>
</div>

<form method="post" class="space-y-4">
    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Full Name</label>
        <input type="text" name="name" required class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
    </div>
    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Enrollment Number</label>
        <input type="text" name="enr" required class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
    </div>
    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Your Entrance Rank</label>
        <input type="number" name="rank" required class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
    </div>
    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
        <input type="password" name="password" required class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
    </div>
    
    <div class="pt-4">
        <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition shadow-md">
            Complete Registration
        </button>
    </div>
</form>


</div>
{% endblock %}
