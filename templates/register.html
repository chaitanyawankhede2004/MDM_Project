{% extends "layout.html" %}

{% block title %}Register - EduPredict{% endblock %}

{% block content %}

<div class="glass-card" style="max-width: 450px; margin: 4rem auto;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h2 style="font-size: 2rem; margin-bottom: 0.5rem;"><i class="fas fa-user-plus" style="color: var(--accent-color);"></i> Create Profile</h2>
        <p style="color: var(--text-secondary);">Start your journey to the right college</p>
    </div>

    <form method="post">
        <div class="form-group">
            <label><i class="fas fa-user" style="opacity: 0.6; margin-right: 5px;"></i> Full Name</label>
            <input type="text" name="name" required class="form-control" placeholder="e.g. John Doe">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-id-card" style="opacity: 0.6; margin-right: 5px;"></i> Enrollment Number</label>
            <input type="text" name="enr" required class="form-control" placeholder="e.g. 2100">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-trophy" style="opacity: 0.6; margin-right: 5px;"></i> Your Entrance Rank</label>
            <input type="number" name="rank" required class="form-control" placeholder="e.g. 15000">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-lock" style="opacity: 0.6; margin-right: 5px;"></i> Password</label>
            <input type="password" name="password" required class="form-control" placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn-primary">Complete Registration</button>
    </form>
    
    <div class="auth-link">
        Already have an account? <a href="/login">Sign In</a>
    </div>
</div>

{% endblock %}
